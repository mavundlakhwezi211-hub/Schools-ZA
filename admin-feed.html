<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrator Feed</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins', Arial, sans-serif;}
body{
    background:linear-gradient(135deg,#f3f7ff 0%, #eef4fb 100%);
    color:#173b5e;
    min-height:100vh;
    padding:24px;
    overflow-x:hidden;
}
.container{max-width:860px;margin:0 auto;display:grid;gap:18px;}
.header-card,
.composer-card,
.post-card{background:#fff;border-radius:20px;box-shadow:0 12px 30px rgba(13,41,68,0.10);border:1px solid rgba(23,59,94,0.08);} 
.header-card{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px;}
.brand h1{font-size:24px;margin-bottom:4px;color:#173b5e;font-weight:700;}
.badge{background:linear-gradient(135deg,#173b5e,#3a79b8);color:#fff;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.composer-card{padding:18px 20px;display:grid;gap:12px;}
.composer-top{display:flex;align-items:center;gap:12px;}
.avatar{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#173b5e,#3a79b8);color:#fff;font-weight:700;}
textarea,input[type="text"]{width:100%;border:1px solid rgba(23,59,94,0.16);border-radius:14px;padding:12px 14px;font-size:15px;color:#173b5e;outline:none;background:#fbfdff;}
textarea{min-height:92px;resize:vertical;}
.input-row{display:flex;gap:10px;flex-wrap:wrap;}
.input-row input[type="text"]{flex:1;min-width:200px;}
input[type="file"]{display:none;}
.photo-picker{display:flex;align-items:center;gap:10px;flex:1;min-width:240px;}
.photo-picker input[type="text"]{flex:1;}
.photo-picker button{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;padding:0;font-size:22px;line-height:1;box-shadow:0 8px 18px rgba(13,41,68,0.16);} 
.btn-row{display:flex;justify-content:flex-end;gap:10px;}
button{border:none;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer;background:#173b5e;color:#fff;box-shadow:0 8px 16px rgba(13,41,68,0.14);} 
button:hover{background:#0f2a45;}
button.secondary{background:#f4f7fb;color:#173b5e;box-shadow:none;border:1px solid rgba(23,59,94,0.1);} 
button.secondary:hover{background:#eaf2fa;}
.post-card{padding:16px 18px;display:grid;gap:12px;}
.post-head{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.post-author{display:flex;align-items:center;gap:12px;}
.author-avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#ff8a65,#ff5e62);color:#fff;font-weight:700;}
.post-time{font-size:12px;color:#90a2b4;}
.post-content{color:#314a62;line-height:1.65;font-size:15px;}
.post-image{border-radius:16px;overflow:hidden;background:#f7fbff;border:1px solid rgba(23,59,94,0.1);}
.post-image img{width:100%;max-height:420px;object-fit:cover;display:block;}
.post-actions{display:flex;gap:10px;flex-wrap:wrap;}
.post-actions button{padding:8px 12px;font-size:13px;background:#f4f7fb;color:#173b5e;box-shadow:none;border:1px solid rgba(23,59,94,0.08);} 
.post-actions button:hover{background:#eaf2fa;} 
.post-actions button.danger{background:#fff1f1;color:#b42318;border:1px solid rgba(180,35,24,0.16);} 
.post-actions button.danger:hover{background:#ffe8e8;} 
.empty{padding:20px;text-align:center;color:#5d6f80;border-radius:16px;border:1px dashed rgba(23,59,94,0.2);background:#fcfeff;}
.message-shell{position:fixed;top:18px;right:18px;width:min(360px, calc(100vw - 24px));max-height:80vh;overflow:hidden;border-radius:20px;background:#fff;box-shadow:0 16px 45px rgba(13,41,68,0.24);border:1px solid rgba(23,59,94,0.12);display:none;z-index:1000;}
.message-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(23,59,94,0.08);background:linear-gradient(135deg,#173b5e,#3a79b8);color:#fff;}
.message-title{font-weight:700;font-size:15px;}
.message-close{border:none;background:transparent;color:#fff;font-size:18px;cursor:pointer;}
.message-list{padding:10px;display:grid;gap:8px;max-height:calc(80vh - 62px);overflow:auto;}
.message-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:#f7fbff;border:1px solid rgba(23,59,94,0.08);cursor:pointer;}
.message-avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#ff8a65,#ff5e62);color:#fff;font-weight:700;flex-shrink:0;}
.message-meta{flex:1;min-width:0;}
.message-name{font-weight:700;font-size:14px;color:#173b5e;}
.message-preview{font-size:12px;color:#5d6f80;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.message-badge{background:#173b5e;color:#fff;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:700;}
@media (max-width: 640px){
    body{padding:14px;}
    .container{gap:14px;}
    .header-card{flex-direction:column;align-items:flex-start;}
    .composer-card,.post-card{padding:16px;}
    .photo-picker{flex-direction:column;align-items:stretch;}
    .photo-picker button{width:100%;height:46px;border-radius:12px;}
    .btn-row{flex-direction:column-reverse;}
    .btn-row button{width:100%;}
    .post-head{flex-direction:column;align-items:flex-start;}
    .post-actions{flex-direction:column;}
    .post-actions button{width:100%;}
    .message-shell{right:12px;left:12px;width:auto;}
}
</style>
</head>
<body>
<div class="container">
    <div class="header-card">
        <div class="brand">
            <h1>School Community Feed</h1>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <a href="inbox.html" id="messageTrigger" style="width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#dceeff;color:#173b5e;box-shadow:0 6px 14px rgba(13,41,68,0.12);font-size:18px;border:none;cursor:pointer;text-decoration:none;">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H8l-3 3V8z"></path>
                </svg>
            </a>
            <div class="badge" id="roleBadge">Loading role...</div>
        </div>
    </div>

    <div class="composer-card" id="composerCard">
        <div class="composer-top">
            <div class="avatar">A</div>
            <div>
                <strong>Administrator</strong>
                <div class="post-time">Create a new post</div>
            </div>
        </div>
        <textarea id="postText" placeholder="Write a status update, announcement, or statement..."></textarea>
        <div class="input-row">
            <div class="photo-picker">
                <input type="text" id="imageUrl" placeholder="Insert photo (optional)">
                <button type="button" id="pickPhotoBtn" aria-label="Choose image file">+</button>
                <input type="file" id="imageFile" accept="image/*">
            </div>
        </div>
        <div class="btn-row">
            <button type="button" class="secondary" id="clearBtn">Clear</button>
            <button type="button" id="publishBtn">Publish Post</button>
        </div>
    </div>

    <div id="feed"></div>
</div>

<div class="message-shell" id="messageShell">
    <div class="message-header">
        <div class="message-title">Inbox</div>
        <button type="button" class="message-close" id="messageClose">×</button>
    </div>
    <div class="message-list">
        <div class="message-item">
            <div class="message-avatar">P</div>
            <div class="message-meta">
                <div class="message-name">Parent Desk</div>
                <div class="message-preview">New update from the school office...</div>
            </div>
            <div class="message-badge">2</div>
        </div>
        <div class="message-item">
            <div class="message-avatar">T</div>
            <div class="message-meta">
                <div class="message-name">Teacher Circle</div>
                <div class="message-preview">Please review the weekly schedule.</div>
            </div>
        </div>
        <div class="message-item">
            <div class="message-avatar">S</div>
            <div class="message-meta">
                <div class="message-name">Student Hub</div>
                <div class="message-preview">Reminder: sports day starts at 8 AM.</div>
            </div>
        </div>
    </div>
</div>

<script>
const storageKey = 'schoolAdminFeed';
const storageFlag = 'schoolAdminFeedCleared';
const profileStorageKey = 'schoolProfileData';
const savedProfile = JSON.parse(localStorage.getItem(profileStorageKey) || '{}');
const selectedRole = (savedProfile.role || '').toString().trim().toLowerCase();
const canPost = selectedRole === 'administrator' || selectedRole === 'admin';
const roleBadge = document.getElementById('roleBadge');
const feed = document.getElementById('feed');
const composerCard = document.getElementById('composerCard');
const postText = document.getElementById('postText');
const imageUrl = document.getElementById('imageUrl');
const imageFile = document.getElementById('imageFile');
const publishBtn = document.getElementById('publishBtn');
const clearBtn = document.getElementById('clearBtn');
const pickPhotoBtn = document.getElementById('pickPhotoBtn');
const messageTrigger = document.getElementById('messageTrigger');
const messageShell = document.getElementById('messageShell');
const messageClose = document.getElementById('messageClose');

function initializeFeedStorage(){
    if (!localStorage.getItem(storageFlag)) {
        localStorage.removeItem(storageKey);
        localStorage.setItem(storageFlag, '1');
    }
}

function defaultPosts(){
    return [];
}

function readPosts(){
    try {
        const saved = localStorage.getItem(storageKey);
        if (!saved) return defaultPosts();
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : defaultPosts();
    } catch (error) {
        console.log('Could not read feed data', error);
        return defaultPosts();
    }
}

function savePosts(posts){
    localStorage.setItem(storageKey, JSON.stringify(posts));
}

function renderFeed(){
    const posts = readPosts();
    if (!posts.length) {
        feed.innerHTML = '<div class="empty">No posts yet. Share the first update.</div>';
        return;
    }

    feed.innerHTML = posts.map(post => `
        <div class="post-card">
            <div class="post-head">
                <div class="post-author">
                    <div class="author-avatar">${post.author.charAt(0)}</div>
                    <div>
                        <div><strong>${post.author}</strong></div>
                        <div class="post-time">${post.role} • ${post.time}</div>
                    </div>
                </div>
                <div class="post-time">${post.time}</div>
            </div>
            ${post.text ? `<div class="post-content">${post.text}</div>` : ''}
            ${post.image ? `<div class="post-image"><img src="${post.image}" alt="Post image"></div>` : ''}
            <div class="post-actions">
                <button type="button">👍 Like</button>
                <button type="button">🔗 Share</button>
                <button type="button" class="danger" onclick="deletePost('${post.id}')">🗑 Delete</button>
            </div>
        </div>
    `).join('');
}

function deletePost(postId){
    const posts = readPosts().filter(post => post.id !== postId);
    savePosts(posts);
    renderFeed();
}

function createPostFromInput(){
    if (!canPost) {
        alert('Only administrators can publish posts.');
        return;
    }

    const text = postText.value.trim();
    if (!text && !imageUrl.value.trim() && !imageFile.files[0]) {
        alert('Please add a statement, image, or both.');
        return;
    }

    const posts = readPosts();
    const file = imageFile.files[0];
    const newPost = {
        id: Date.now().toString(),
        author: 'Administrator',
        role: 'School Admin',
        time: 'Just now',
        text: text,
        image: ''
    };

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e){
            newPost.image = e.target.result;
            posts.unshift(newPost);
            savePosts(posts);
            renderFeed();
            resetComposer();
        };
        reader.readAsDataURL(file);
    } else {
        newPost.image = imageUrl.value.trim();
        posts.unshift(newPost);
        savePosts(posts);
        renderFeed();
        resetComposer();
    }
}

function resetComposer(){
    postText.value='';
    imageUrl.value='';
    imageFile.value='';
}

initializeFeedStorage();
if (roleBadge) {
    const displayRole = selectedRole ? selectedRole.replace(/\b\w/g, (char) => char.toUpperCase()) : 'Role not set';
    roleBadge.textContent = `You are a ${displayRole}`;
}
if (!canPost) {
    composerCard.style.display = 'none';
}
pickPhotoBtn.addEventListener('click', () => imageFile.click());
imageFile.addEventListener('change', () => {
    if (imageFile.files && imageFile.files[0]) {
        imageUrl.value = imageFile.files[0].name;
    }
});
messageTrigger.addEventListener('click', () => {
    messageShell.style.display = messageShell.style.display === 'block' ? 'none' : 'block';
});
messageClose.addEventListener('click', () => {
    messageShell.style.display = 'none';
});
publishBtn.addEventListener('click', createPostFromInput);
clearBtn.addEventListener('click', resetComposer);
renderFeed();
</script>
</body>
</html>
