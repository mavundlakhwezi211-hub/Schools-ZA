<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins', Arial, sans-serif;}
body{background:linear-gradient(135deg,#f3f7ff 0%, #eef4fb 100%);color:#173b5e;min-height:100vh;padding:24px;overflow-x:hidden;}
.page{max-width:900px;margin:0 auto;display:grid;gap:16px;}
.card{background:#fff;border-radius:22px;box-shadow:0 14px 34px rgba(13,41,68,0.12);border:1px solid rgba(23,59,94,0.08);overflow:hidden;position:relative;}
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid rgba(23,59,94,0.08);background:linear-gradient(135deg,#173b5e,#3a79b8);color:#fff;}
.header h1{font-size:20px;font-weight:700;}
.back-link{color:#fff;text-decoration:none;font-weight:600;}
.list{display:grid;gap:10px;padding:14px;}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:#f7fbff;border:1px solid rgba(23,59,94,0.08);}
.avatar{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#ff8a65,#ff5e62);color:#fff;font-weight:700;flex-shrink:0;}
.meta{flex:1;min-width:0;}
.name{font-size:14px;font-weight:700;color:#173b5e;}
.preview{font-size:13px;color:#5d6f80;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.badge{background:#173b5e;color:#fff;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700;}
.plus-btn{position:absolute;right:18px;bottom:18px;width:54px;height:54px;border:none;border-radius:50%;background:linear-gradient(135deg,#173b5e,#3a79b8);color:#fff;font-size:28px;display:grid;place-items:center;box-shadow:0 10px 24px rgba(23,59,94,0.24);cursor:pointer;}
.modal{position:fixed;inset:0;background:rgba(7,18,32,0.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:20;}
.modal.active{display:flex;}
.modal-card{background:#fff;border-radius:18px;padding:20px;width:min(420px,100%);box-shadow:0 16px 36px rgba(0,0,0,0.2);}
.modal-card h2{font-size:18px;margin-bottom:12px;color:#173b5e;}
.teacher-option{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid rgba(23,59,94,0.12);border-radius:12px;margin-bottom:8px;cursor:pointer;background:#f7fbff;}
.teacher-option:hover{background:#eef6ff;}
.close-btn{margin-top:10px;border:none;background:#173b5e;color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer;}
@media (max-width:640px){body{padding:14px;} .header{padding:14px 16px;} .chat-item{padding:10px;} .plus-btn{right:14px;bottom:14px;width:50px;height:50px;font-size:24px;} }
</style>
</head>
<body>
<div class="page">
    <div class="card">
        <div class="header">
            <h1>Inbox</h1>
            <a class="back-link" href="admin-feed.html">Back</a>
        </div>
        <div class="list"></div>
    </div>
    <button class="plus-btn" type="button" onclick="openTeacherSelector()" aria-label="Select a teacher">+</button>
</div>
<div class="modal" id="teacherModal" role="dialog" aria-modal="true" aria-label="Select a teacher">
    <div class="modal-card">
        <h2>Select a teacher</h2>
        <div class="teacher-option" onclick="selectTeacher('Ms. Ndlovu')">
            <span>Ms. Ndlovu</span>
            <strong>Math</strong>
        </div>
        <div class="teacher-option" onclick="selectTeacher('Mr. Khumalo')">
            <span>Mr. Khumalo</span>
            <strong>Science</strong>
        </div>
        <div class="teacher-option" onclick="selectTeacher('Mrs. Patel')">
            <span>Mrs. Patel</span>
            <strong>English</strong>
        </div>
        <button class="close-btn" type="button" onclick="closeTeacherSelector()">Close</button>
    </div>
</div>
<script>
function openTeacherSelector(){
    document.getElementById('teacherModal').classList.add('active');
}
function closeTeacherSelector(){
    document.getElementById('teacherModal').classList.remove('active');
}
function selectTeacher(name){
    const list = document.querySelector('.list');
    const existing = Array.from(list.children).find(item => item.dataset.teacher === name);
    if(existing){
        closeTeacherSelector();
        return;
    }
    const item = document.createElement('div');
    item.className = 'chat-item';
    item.dataset.teacher = name;
    item.innerHTML = `<div class="avatar">${name.charAt(0)}</div><div class="meta"><div class="name">${name}</div><div class="preview">Tap to start a conversation</div></div><div class="badge">New</div>`;
    list.appendChild(item);
    closeTeacherSelector();
}
</script>
</body>
</html>
